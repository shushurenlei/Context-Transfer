name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Add Git to PATH (fix Windows checkout hang)
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
          dpkg -L libglib2.0-dev | grep gobject-2.0.pc
          pkg-config --modversion gobject-2.0
          pkg-config --cflags gobject-2.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Fetch cargo dependencies
        run: cd src-tauri && cargo fetch

      - name: Build Rust (check-only on non-macOS)
        if: matrix.os != 'macos-latest'
        run: cd src-tauri && cargo check

      - name: Build Rust (full build on macOS)
        if: matrix.os == 'macos-latest'
        run: cd src-tauri && cargo build --release

      - name: Run tests
        run: cd src-tauri && cargo test
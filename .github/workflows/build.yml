name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Add Git to PATH (fix Windows checkout hang)
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\Git\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev
          dpkg -L libglib2.0-dev | grep gobject-2.0.pc
          pkg-config --modversion gobject-2.0
          pkg-config --cflags gobject-2.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Fetch cargo dependencies
        run: cd src-tauri && cargo fetch

      - name: Build Rust (check-only on non-macOS)
        if: matrix.os != 'macos-latest' && !startsWith(github.ref, 'refs/tags/')
        run: cd src-tauri && cargo check

      - name: Build Rust (full build on macOS)
        if: matrix.os == 'macos-latest' && !startsWith(github.ref, 'refs/tags/')
        run: cd src-tauri && cargo build --release

      - name: Build Tauri bundles
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -eux
          npm --prefix frontend run build
          cd src-tauri
          ../frontend/node_modules/.bin/tauri build

      - name: Upload Tauri bundles
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: context-transfer-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error

      - name: Run tests
        run: cd src-tauri && cargo test

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Tauri bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          assets=(artifacts/**/*)
          files=()
          for asset in "${assets[@]}"; do
            if [ -f "$asset" ]; then
              files+=("$asset")
            fi
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
